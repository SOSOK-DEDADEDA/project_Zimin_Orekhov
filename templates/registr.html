{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 3px solid #40E0D0; border-radius: 10px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: #1a1a1a;">Регистрация</h2>
    
    <form method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Имя пользователя:</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Пароль:</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Подтверждение пароля:</label>
            <input type="password" name="confirm_password" required style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 12px; background: #40E0D0; color: #1a1a1a; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;">
            Зарегистрироваться
        </button>
    </form>
    
    <div style="margin-top: 20px; text-align: center;">
        <p>Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: #40E0D0; text-decoration: none;">Войдите</a></p>
    </div>
</div>
{% endblock %}
